<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>폭탄 초성 게임</title>
  <style>
    body {
      margin: 0;
      background: #111;
      color: white;
      font-family: sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      flex-direction: column;
      text-align: center;
      padding: 20px;
      box-sizing: border-box;
    }

    h1 {
      margin-bottom: 20px;
      font-size: 2rem;
    }

    #game-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      width: 100%;
      max-width: 500px;
    }

    #bombImage {
      width: min(220px, 60vw);
      height: min(220px, 60vw);
      object-fit: contain;
      image-rendering: pixelated;
    }

    button {
      padding: 16px 32px;
      font-size: 24px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      background: #ff4d4d;
      color: white;
      font-weight: bold;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    #status {
      font-size: 28px;
      min-height: 40px;
      text-align: center;
      word-break: keep-all;
    }

    #hint {
      font-size: 15px;
      color: #bbb;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <h1>💣 폭탄 초성 게임 💣</h1>

  <div id="game-container">
    <img id="bombImage" src="bomb.png" alt="폭탄 이미지" />
    <button id="startButton">시작</button>
    <div id="status">버튼을 누르면 시작!</div>
    <div id="hint">아이폰/아이패드에서는 무음 모드 해제 및 볼륨 확인</div>
  </div>

  <script>
    let tickInterval = null;
    let bombTimeout = null;
    let isRunning = false;
    let audioUnlocked = false;

    const tickSound = new Audio("tick.mp3");
    const bombSound = new Audio("bomb.mp3");

    tickSound.preload = "auto";
    bombSound.preload = "auto";

    const startButton = document.getElementById("startButton");
    const status = document.getElementById("status");
    const bombImage = document.getElementById("bombImage");

    async function unlockAudio() {
      if (audioUnlocked) return true;

      try {
        tickSound.muted = true;
        bombSound.muted = true;

        await tickSound.play();
        tickSound.pause();
        tickSound.currentTime = 0;

        await bombSound.play();
        bombSound.pause();
        bombSound.currentTime = 0;

        tickSound.muted = false;
        bombSound.muted = false;

        audioUnlocked = true;
        return true;
      } catch (error) {
        tickSound.muted = false;
        bombSound.muted = false;
        console.log("오디오 언락 실패:", error);
        return false;
      }
    }

    async function playTick() {
      try {
        tickSound.pause();
        tickSound.currentTime = 0;
        await tickSound.play();
      } catch (error) {
        console.log("틱 소리 재생 실패:", error);
      }
    }

    async function playBomb() {
      try {
        bombSound.pause();
        bombSound.currentTime = 0;
        await bombSound.play();
      } catch (error) {
        console.log("폭발 소리 재생 실패:", error);
      }
    }

    async function startBomb() {
      if (isRunning) return;
      isRunning = true;

      startButton.disabled = true;

      await unlockAudio();

      clearInterval(tickInterval);
      clearTimeout(bombTimeout);

      tickSound.pause();
      tickSound.currentTime = 0;
      bombSound.pause();
      bombSound.currentTime = 0;

      bombImage.src = "bomb.png";
      status.innerText = "⏳ 폭탄 작동 중...";

      const min = 7000;
      const max = 20000;
      const randomTime = Math.random() * (max - min) + min;

      await playTick();

      tickInterval = setInterval(() => {
        playTick();
      }, 1000);

      bombTimeout = setTimeout(async () => {
        clearInterval(tickInterval);

        tickSound.pause();
        tickSound.currentTime = 0;

        bombImage.src = "explosion.gif";
        status.innerText = "💥 터졌다!";

        await playBomb();

        isRunning = false;
        startButton.disabled = false;
      }, randomTime);
    }

    startButton.addEventListener("click", startBomb);
  </script>
</body>
</html>
